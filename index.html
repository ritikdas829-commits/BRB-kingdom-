<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRB Kingdom 👑</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #090a0c; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; animation: move 100s linear infinite; }
        @keyframes move { from { background-position: 0 0; } to { background-position: 10000px 10000px; } }
        .card { position: relative; background: rgba(20, 22, 27, 0.9); padding: 50px; border-radius: 30px; border: 1px solid rgba(114, 137, 218, 0.3); box-shadow: 0 0 40px rgba(88, 101, 242, 0.2); text-align: center; backdrop-filter: blur(15px); max-width: 380px; width: 90%; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #5865f2; box-shadow: 0 0 20px #5865f2; margin-bottom: 20px; transition: 0.5s; }
        .avatar:hover { transform: rotate(360deg) scale(1.1); }
        h1 { margin: 10px 0; font-size: 2.2em; color: #fff; text-shadow: 0 0 10px #5865f2; }
        p { color: #8e9297; font-size: 1.1em; margin-bottom: 30px; }
        .btn { display: block; padding: 14px; margin: 12px 0; border-radius: 15px; text-decoration: none; font-weight: bold; color: white; transition: 0.3s; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        .invite { background: #5865f2; border: none; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(88, 101, 242, 0); } 100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); } }
        .support { background: #2f3136; border: 1px solid #4e5058; }
        .youtube { background: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="card">
        <img src="https://ritikdas829-commits.github.io/BRB-kingdom-/logo.png" class="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
        <h1>MRB Kingdom 👑</h1>
        <p>The Ultimate Discord Powerhouse!</p>
        
        <a href="https://discord.com/oauth2/authorize?client_id=1490514307648196790&permissions=8&integration_type=0&scope=bot+applications.commands" class="btn invite">Invite MRB Kingdom</a>
        
        <a href="https://discord.gg/R2yV62xPGw" class="btn support">Support Server</a>
        <a href="https://youtube.com/@mr_ritik_bhai_1" class="btn youtube">YouTube Channel</a>
    </div>
</body>
</html>
