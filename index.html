<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f1014; color: white; text-align: center; margin: 0; padding: 50px 20px; }
        .container { background: #1a1c23; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 0 20px rgba(114, 137, 218, 0.2); border: 1px solid #2d303d; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; border: 3px solid #7289da; }
        h1 { font-size: 2.2em; margin: 0; color: #7289da; }
        p { color: #8e9297; margin-bottom: 30px; }
        .btn { display: block; padding: 12px 25px; margin: 10px auto; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; transition: 0.3s; width: 200px; }
        .invite { background: #5865f2; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3); }
        .invite:hover { transform: scale(1.05); background: #4752c4; }
        .support { background: #23272a; border: 1px solid #4e5058; }
        .youtube { background: #ff0000; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>

    <div class="container">
        <img src="https://ritikdas829-commits.github.io/BRB-kingdom-/logo.png" class="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">

        <a href="https://discord.com/api/oauth2/authorize?client_id=YOUR_CLIENT_ID&permissions=8&scope=bot%20applications.commands" class="btn invite">Invite Bot</a>
        <a href="https://discord.gg/R2yV62xPGw" class="btn support">Support Server</a>
